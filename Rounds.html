<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOUNCE BATTLE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            text-align: center;
            position: relative;
        }

        canvas {
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            background: #0f3460;
        }

        #ui {
            color: white;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            max-width: 800px;
        }

        .player-info {
            flex: 1;
            text-align: center;
        }

        .player-info h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .health-bar {
            width: 150px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            margin: 10px auto;
            overflow: hidden;
            border: 2px solid #fff;
        }

        .health-fill {
            height: 100%;
            transition: width 0.3s;
        }

        .player1-health {
            background: linear-gradient(90deg, #ff4444, #cc0000);
        }

        .player2-health {
            background: linear-gradient(90deg, #4444ff, #0000cc);
        }

        .score-dots {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 10px;
        }

        .score-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 3px solid #fff;
            transition: all 0.3s ease;
        }

        .score-dot.filled {
            background: currentColor;
            box-shadow: 0 0 10px currentColor;
        }

        .score-dot.half {
            background: linear-gradient(90deg, currentColor 50%, transparent 50%);
            box-shadow: 0 0 10px currentColor;
        }

        .bullets {
            font-size: 18px;
            margin-top: 5px;
            color: #FFA500;
        }

        .controls {
            font-size: 11px;
            margin-top: 5px;
            opacity: 0.8;
        }

        .center-score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            pointer-events: none;
            z-index: 5;
        }

        .center-score .score-dots {
            gap: 12px;
        }

        .center-score .score-dot {
            width: 25px;
            height: 25px;
            border: 4px solid #fff;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .card-display {
            font-size: 10px;
            margin-top: 5px;
            color: #FFD700;
            min-height: 12px;
            font-weight: bold;
        }


        #cardSelection {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.98) 0%, rgba(22, 33, 62, 0.98) 100%);
            color: white;
            padding: 40px;
            border-radius: 20px;
            z-index: 10;
            min-width: 650px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        #cardSelection h2 {
            margin-bottom: 10px;
            font-size: 32px;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        #cardSelection p {
            margin-bottom: 25px;
            font-size: 16px;
            color: #E0E0E0;
        }

        .card-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .card {
            width: 160px;
            padding: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 3px solid #FFD700;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .card:hover {
            transform: translateY(-12px) scale(1.08);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.6);
            border-color: #FFF;
            background: linear-gradient(135deg, #7b8ef1 0%, #8a5bb8 100%);
        }

        .card h3 {
            font-size: 19px;
            margin-bottom: 12px;
            color: #FFD700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            font-weight: bold;
        }

        .card p {
            font-size: 14px;
            line-height: 1.5;
            color: #F0F0F0;
        }

        #gameOver {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.98) 0%, rgba(22, 33, 62, 0.98) 100%);
            color: white;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            z-index: 10;
            min-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        #gameOver h2 {
            font-size: 42px;
            margin-bottom: 20px;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        #gameOver p {
            font-size: 20px;
            color: #E0E0E0;
            margin-bottom: 10px;
        }

        #gameOver button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: 2px solid #FFD700;
            padding: 18px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        #gameOver button:hover {
            background: linear-gradient(135deg, #7b8ef1 0%, #8a5bb8 100%);
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
        }

        .parry-indicator {
            position: absolute;
            color: #FFD700;
            font-weight: bold;
            font-size: 14px;
            pointer-events: none;
            text-shadow: 0 0 10px #FFD700;
        }

        #colorPicker {
            display: flex;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            color: white;
            padding: 40px;
            border-radius: 15px;
            z-index: 100;
            gap: 40px;
        }

        .color-section {
            text-align: center;
        }

        .color-section h2 {
            margin-bottom: 20px;
            font-size: 24px;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(4, 60px);
            gap: 10px;
            margin-top: 20px;
        }

        .color-option {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s, border 0.2s;
        }

        .color-option:hover {
            transform: scale(1.1);
            border: 3px solid white;
        }

        .color-option.selected {
            border: 4px solid #FFD700;
            transform: scale(1.15);
        }

        #startGameBtn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        #startGameBtn:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div id="colorPicker">
        <h1 style="font-size: 48px; color: #FFD700; text-shadow: 3px 3px 6px rgba(0,0,0,0.5); margin-bottom: 30px;">⚡ BOUNCE BATTLE ⚡</h1>
        <div class="color-section">
            <h2>🔴 Player 1 Color</h2>
            <div class="color-grid" id="player1Colors"></div>
        </div>
        <div class="color-section">
            <h2>🔵 Player 2 Color</h2>
            <div class="color-grid" id="player2Colors"></div>
        </div>
        <button id="startGameBtn" onclick="startGame()">Start Game</button>
    </div>

    <div id="gameContainer" style="display: none;">
        <div id="ui">
            <div class="player-info">
                <h3>🔴 Player 1</h3>
                <div class="health-bar">
                    <div class="health-fill player1-health" id="player1Health" style="width: 100%"></div>
                </div>
                <div class="bullets">Ammo: <span id="player1Bullets">3</span></div>
                <div class="controls">WASD: Move | SPACE: Shoot | SHIFT: Parry</div>
                <div class="card-display" id="player1Cards"></div>
            </div>
            <div class="player-info">
                <h3>🔵 Player 2</h3>
                <div class="health-bar">
                    <div class="health-fill player2-health" id="player2Health" style="width: 100%"></div>
                </div>
                <div class="bullets">Ammo: <span id="player2Bullets">3</span></div>
                <div class="controls">Arrows: Move | M: Shoot | N: Parry</div>
                <div class="card-display" id="player2Cards"></div>
            </div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <!-- Center score display -->
        <div class="center-score">
            <div class="score-dots" id="player1CenterDots">
                <div class="score-dot" style="color: #FF4444;"></div>
                <div class="score-dot" style="color: #FF4444;"></div>
                <div class="score-dot" style="color: #FF4444;"></div>
                <div class="score-dot" style="color: #FF4444;"></div>
                <div class="score-dot" style="color: #FF4444;"></div>
            </div>
            <div class="score-dots" id="player2CenterDots">
                <div class="score-dot" style="color: #4444FF;"></div>
                <div class="score-dot" style="color: #4444FF;"></div>
                <div class="score-dot" style="color: #4444FF;"></div>
                <div class="score-dot" style="color: #4444FF;"></div>
                <div class="score-dot" style="color: #4444FF;"></div>
            </div>
        </div>
        
        <div id="cardSelection">
            <h2 id="cardWinner"></h2>
            <p>Choose one card to upgrade your abilities:</p>
            <div class="card-container" id="cardContainer"></div>
        </div>

        <div id="gameOver">
            <h2 id="winnerText"></h2>
            <p id="finalScores"></p>
            <button onclick="restartGame()">Play Again</button>
        </div>

        <div id="colorSelection" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95); color: white; padding: 40px; border-radius: 15px; z-index: 20; text-align: center;">
            <h2 style="margin-bottom: 30px;">Choose Your Colors</h2>
            <div style="display: flex; gap: 50px; justify-content: center;">
                <div>
                    <h3>🔴 Player 1</h3>
                    <div style="display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; max-width: 200px;">
                        <div onclick="selectColor(1, '#FF4444')" style="width: 40px; height: 40px; background: #FF4444; border: 3px solid white; border-radius: 5px; cursor: pointer;"></div>
                        <div onclick="selectColor(1, '#FF6B35')" style="width: 40px; height: 40px; background: #FF6B35; border: 3px solid white; border-radius: 5px; cursor: pointer;"></div>
                        <div onclick="selectColor(1, '#FFD700')" style="width: 40px; height: 40px; background: #FFD700; border: 3px solid white; border-radius: 5px; cursor: pointer;"></div>
                        <div onclick="selectColor(1, '#00FF00')" style="width: 40px; height: 40px; background: #00FF00; border: 3px solid white; border-radius: 5px; cursor: pointer;"></div>
                        <div onclick="selectColor(1, '#00FFFF')" style="width: 40px; height: 40px; background: #00FFFF; border: 3px solid white; border-radius: 5px; cursor: pointer;"></div>
                        <div onclick="selectColor(1, '#FF00FF')" style="width: 40px; height: 40px; background: #FF00FF; border: 3px solid white; border-radius: 5px; cursor: pointer;"></div>
                        <div onclick="selectColor(1, '#FFFFFF')" style="width: 40px; height: 40px; background: #FFFFFF; border: 3px solid white; border-radius: 5px; cursor: pointer;"></div>
                        <div onclick="selectColor(1, '#FFA500')" style="width: 40px; height: 40px; background: #FFA500; border: 3px solid white; border-radius: 5px; cursor: pointer;"></div>
                    </div>
                    <p id="p1ColorChoice" style="margin-top: 15px;">Selected: Red</p>
                </div>
                <div>
                    <h3>🔵 Player 2</h3>
                    <div style="display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; max-width: 200px;">
                        <div onclick="selectColor(2, '#4444FF')" style="width: 40px; height: 40px; background: #4444FF; border: 3px solid white; border-radius: 5px; cursor: pointer;"></div>
                        <div onclick="selectColor(2, '#FF6B35')" style="width: 40px; height: 40px; background: #FF6B35; border: 3px solid white; border-radius: 5px; cursor: pointer;"></div>
                        <div onclick="selectColor(2, '#FFD700')" style="width: 40px; height: 40px; background: #FFD700; border: 3px solid white; border-radius: 5px; cursor: pointer;"></div>
                        <div onclick="selectColor(2, '#00FF00')" style="width: 40px; height: 40px; background: #00FF00; border: 3px solid white; border-radius: 5px; cursor: pointer;"></div>
                        <div onclick="selectColor(2, '#00FFFF')" style="width: 40px; height: 40px; background: #00FFFF; border: 3px solid white; border-radius: 5px; cursor: pointer;"></div>
                        <div onclick="selectColor(2, '#FF00FF')" style="width: 40px; height: 40px; background: #FF00FF; border: 3px solid white; border-radius: 5px; cursor: pointer;"></div>
                        <div onclick="selectColor(2, '#FFFFFF')" style="width: 40px; height: 40px; background: #FFFFFF; border: 3px solid white; border-radius: 5px; cursor: pointer;"></div>
                        <div onclick="selectColor(2, '#FFA500')" style="width: 40px; height: 40px; background: #FFA500; border: 3px solid white; border-radius: 5px; cursor: pointer;"></div>
                    </div>
                    <p id="p2ColorChoice" style="margin-top: 15px;">Selected: Blue</p>
                </div>
            </div>
            <button onclick="startGameWithColors()" style="background: #667eea; color: white; border: none; padding: 15px 40px; font-size: 18px; border-radius: 5px; cursor: pointer; margin-top: 30px;">Start Game</button>
        </div>
    </div>

    <script>
        // Color selection
        const colors = [
            '#FF4444', '#FF6B6B', '#FF0000', '#CC0000',
            '#4444FF', '#6B6BFF', '#0000FF', '#0000CC',
            '#44FF44', '#6BFF6B', '#00FF00', '#00CC00',
            '#FFFF44', '#FFFF6B', '#FFD700', '#FFA500',
            '#FF44FF', '#FF6BFF', '#FF00FF', '#CC00CC',
            '#44FFFF', '#6BFFFF', '#00FFFF', '#00CCCC',
            '#FFFFFF', '#CCCCCC', '#888888', '#444444'
        ];

        let selectedColors = {
            player1: '#FF4444',
            player2: '#4444FF'
        };

        // Populate color grids
        function initColorPicker() {
            const p1Grid = document.getElementById('player1Colors');
            const p2Grid = document.getElementById('player2Colors');
            
            colors.forEach(color => {
                const option1 = document.createElement('div');
                option1.className = 'color-option';
                option1.style.background = color;
                if (color === selectedColors.player1) option1.classList.add('selected');
                option1.onclick = () => selectColor('player1', color, option1);
                p1Grid.appendChild(option1);
                
                const option2 = document.createElement('div');
                option2.className = 'color-option';
                option2.style.background = color;
                if (color === selectedColors.player2) option2.classList.add('selected');
                option2.onclick = () => selectColor('player2', color, option2);
                p2Grid.appendChild(option2);
            });
        }

        function selectColor(player, color, element) {
            selectedColors[player] = color;
            const grid = element.parentElement;
            grid.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
        }

        function startGame() {
            document.getElementById('colorPicker').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'block';
            initGame();
        }

        initColorPicker();

        function initGame() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Color name mapping
        const colorNames = {
            '#FF4444': 'Red',
            '#4444FF': 'Blue',
            '#FF6B35': 'Orange',
            '#FFD700': 'Gold',
            '#00FF00': 'Green',
            '#00FFFF': 'Cyan',
            '#FF00FF': 'Magenta',
            '#FFFFFF': 'White',
            '#FFA500': 'Orange'
        };

        // Color selection
        function selectColor(player, color) {
            if (player === 1) {
                player1Color = color;
                document.getElementById('p1ColorChoice').textContent = 'Selected: ' + colorNames[color];
            } else {
                player2Color = color;
                document.getElementById('p2ColorChoice').textContent = 'Selected: ' + colorNames[color];
            }
        }

        function startGameWithColors() {
            document.getElementById('colorSelection').style.display = 'none';
            player1.color = player1Color;
            player2.color = player2Color;
            gameStarted = true;
            gameRunning = true;
        }

        // Game state
        let gameRunning = true;
        let gameStarted = true;
        let keys = {};
        let currentRound = 1;
        let maxRounds = 5;
        let waitingForCardSelection = false;
        let cardWinner = null;
        let player1SelectedCards = []; // Track P1's card choices
        let player2SelectedCards = []; // Track P2's card choices
        let player1Color = '#FF4444';
        let player2Color = '#4444FF';

        const cardTypes = [
            // Basic upgrades
            { name: "+20 Max Health", abbrev: "MaxHP+", effect: "maxHealth", value: 20, description: "Increase max health by 20" },
            { name: "+30 Health", abbrev: "Heal+", effect: "health", value: 30, description: "Instantly heal 30 HP" },
            { name: "+1 Damage", abbrev: "DMG+", effect: "damage", value: 1, description: "Bullets deal +1 damage" },
            { name: "Fast Bullets", abbrev: "FastShot", effect: "bulletSpeed", value: 3, description: "Bullets move faster" },
            { name: "Quick Reload", abbrev: "QuickLoad", effect: "reloadSpeed", value: -1000, description: "Reload 1s faster" },
            { name: "+1 Max Ammo", abbrev: "Ammo+", effect: "maxBullets", value: 1, description: "Carry one more bullet" },
            { name: "Life Steal", abbrev: "LifeSteal", effect: "lifeSteal", value: 5, description: "Heal 5 HP per hit" },
            { name: "Long Parry", abbrev: "LongParry", effect: "parryDuration", value: 200, description: "Parry window lasts longer" },
            { name: "Quick Parry", abbrev: "QuikParry", effect: "parryCooldown", value: -1000, description: "Parry cooldown reduced by 1s" },
            { name: "Speed Boost", abbrev: "Speed+", effect: "speed", value: 1, description: "Move faster" },
            { name: "High Jump", abbrev: "HighJump", effect: "jumpPower", value: 2, description: "Jump higher" },
            { name: "Triple Jump", abbrev: "3xJump", effect: "maxJumps", value: 1, description: "Gain an extra jump" },
            { name: "Low Gravity", abbrev: "LowGrav", effect: "gravity", value: -0.1, description: "Fall slower, float longer" },
            { name: "Bullet Size", abbrev: "BigBullet", effect: "bulletSize", value: 2, description: "Bigger bullets, easier hits" },
            { name: "Piercing Shot", abbrev: "Piercing", effect: "piercing", value: 1, description: "Bullets go through platforms" },
            
            // Advanced cards with tradeoffs
            { name: "Homing Bullets", abbrev: "Homing", effect: "homing", value: 1, tradeoff: "bulletSpeed", tradeoffValue: -3, description: "Bullets track enemies but move slower" },
            { name: "Explosive Shot", abbrev: "Explosive", effect: "explosive", value: 1, tradeoff: "shootCooldown", tradeoffValue: 1000, description: "Bullets explode on impact, +1s reload" },
            { name: "Growing Bullets", abbrev: "Growing", effect: "growing", value: 1, tradeoff: "damage", tradeoffValue: -5, description: "Bullets gain damage over distance, -5 base damage" },
            { name: "Parasite Shot", abbrev: "Parasite", effect: "parasite", value: 1, tradeoff: "damage", tradeoffValue: -5, description: "Damage over 5 seconds, -5 impact damage" },
            { name: "Barrage", abbrev: "Barrage", effect: "barrage", value: 1, tradeoff: "shootCooldown", tradeoffValue: 2000, description: "Fire 3 bullets at once, +2s reload" },
            { name: "Tactical Reload", abbrev: "TacReload", effect: "tacticalReload", value: 1, tradeoff: "maxBullets", tradeoffValue: -1, description: "Parry reloads weapon, -1 max ammo" },
            { name: "Rapid Fire", abbrev: "RapidFire", effect: "shootCooldown", value: -1500, tradeoff: "damage", tradeoffValue: -5, description: "Reload 1.5s faster, -5 damage" },
            { name: "Heavy Rounds", abbrev: "HeavyRnd", effect: "damage", value: 10, tradeoff: "shootCooldown", tradeoffValue: 1500, description: "+10 damage, +1.5s reload time" },
